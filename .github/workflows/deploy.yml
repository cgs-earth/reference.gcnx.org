name: refernce.gcx.org pygeoapi build

on:
  push:
    branches:
      - "main"
    paths:
      - "pygeoapi.config.yml"
  workflow_dispatch:

env:
  REGISTRY: global-reference-features
  DATABASE: reference
  DBUSER: root

jobs:
  upload-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sql data
        uses: cgs-earth/hydrodump-action@master
        with:
          username: ${{ secrets.HYDRO_USERNAME }}
          password: ${{ secrets.HYDRO_PASSWORD }}
          dbuser: ${{ env.DBUSER }}
          resource: 94da03d9ea4d4815b4de6bdd29da6fb4

      - name: Set up Cloud SDK
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Upload backup to GCP Bucket
        id: upload-files
        uses: google-github-actions/upload-cloud-storage@v3
        with:
          path: .
          destination: ${{ env.REGISTRY }}
          gzip: false
          parent: false
          glob: "**/*.sql.gz"
          headers: |-
            content-type: application/x-gzip

      - name: Push to PostgreSQL
        run: |-
          gcloud sql import sql ${{ env.REGISTRY }} gs://${{ env.REGISTRY }}/${{ env.DATABASE }}.sql.gz \
            --database=${{ env.DATABASE }} \
            --user=${{ env.DBUSER }}
